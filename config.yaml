  - {name: 🇯🇵 日本节点, type: url-test, tolerance: 50, include-all: true, filter: '(?i)^(?=.*(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK|东京|大阪|埼玉|九州|仙台))(?!.*(尼日利亚|尼日尔|日内瓦)).+'}

  - {name: 🇰🇷 韩国节点, type: url-test, tolerance: 50, include-all: true, filter: '(?i)^(?=.*(韩|🇰🇷|韓|首尔|南朝鲜|欧巴|泡菜|KR|KOR|Korea|South))(?!.*(排除1|排除2)).+' }

  - {name: 🇸🇬 新加坡节点, type: url-test, tolerance: 50, include-all: true, filter: '(?i)^(?=.*(坡|🇸🇬|SG|Sing|SIN|XSP|马来|my|狮城))(?!.*(排除1|排除2)).+'}

  - {name: 👑 高级节点, type: url-test, interval: 300, tolerance: 50, include-all: true, filter: '(?i)^(?=.*(专线|专用|高级|直连|急速|高速|高倍率|游戏|铂金|钻石|企业|VIP|Ultra|Game|IEPL|IPLC|AIA|BGP|GIA|CN2|CMI|HGC|HKT|CTM|CC|AC|x([2-9]|\\d{2,})))(?!.*(排除1|排除2)).+'}
